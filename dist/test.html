<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WkzForms Test Page</title>

    <!-- intl-tel-input -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@25.3.1/build/css/intlTelInput.css" />
    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@25.3.1/build/js/intlTelInputWithUtils.min.js"></script>

    <!-- WkzForms -->
    <link rel="stylesheet" href="wkz-forms.css" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f0f0;
            padding: 40px 20px;
        }
        .test-section {
            max-width: 520px;
            margin: 0 auto 60px;
        }
        .test-section h2 {
            margin-bottom: 20px;
            font-size: 18px;
            color: #333;
        }
        .dark-bg {
            background: #1C1F20;
            padding: 32px;
            border-radius: 16px;
        }
        .light-bg {
            background: #fff;
            padding: 32px;
            border-radius: 16px;
            border: 1px solid #e0e0e0;
        }
        .trigger-section {
            text-align: center;
            margin: 40px auto;
        }
        .demo-btn {
            padding: 12px 32px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            background: #2A3E66;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .demo-btn:hover {
            background: #1B2A4A;
        }
    </style>
</head>
<body>

    <!-- ============ TEST 1: Inline Dark Form ============ -->
    <div class="test-section">
        <h2>Form 1: Free Book (inline, dark, single step)</h2>
        <div class="dark-bg">
            <div data-wkz-form="free-book"></div>
        </div>
    </div>

    <!-- ============ TEST 2: Modal Trigger ============ -->
    <div class="test-section trigger-section">
        <h2>Form 2: Book a Demo (modal, light, 2-step)</h2>
        <p style="margin-bottom: 16px; color: #666;">Click the button to open the modal form:</p>
        <button class="demo-btn" data-action="book-a-demo">Book a Demo</button>
    </div>

    <!-- Hidden placeholder for modal (engine moves it to body overlay) -->
    <div data-wkz-form="book-a-demo"></div>

    <!-- WkzForms Engine + Configs -->
    <script src="wkz-forms.js"></script>
    <script src="wkz-forms-configs.js"></script>

</body>
</html>
