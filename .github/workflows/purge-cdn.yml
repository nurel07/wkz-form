name: Purge jsDelivr Cache
on:
  push:
    branches: [main]
    paths: ['dist/**']

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Purge jsDelivr cache
        run: |
          curl -s "https://purge.jsdelivr.net/gh/nurel07/wkz-form@main/dist/wkz-forms.js"
          curl -s "https://purge.jsdelivr.net/gh/nurel07/wkz-form@main/dist/wkz-forms.css"
          curl -s "https://purge.jsdelivr.net/gh/nurel07/wkz-form@main/dist/wkz-forms-configs.js"
